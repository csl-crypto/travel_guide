<!doctype html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>푸꾸옥 여행 가이드</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div class="app-shell">
		<header class="app-header">
			<div class="trip-title">
				<p>2026.07.29 - 08.02</p>
				<h1>푸꾸옥 여행 가이드</h1>
			</div>
		</header>

		<nav class="bottom-nav" aria-label="바로가기">
			<a href="#timeTable">시간표</a>
			<a href="#links">링크</a>
			<a href="#checklist">체크</a>
		</nav>

		<main>
			<section class="quick-panel" aria-label="여행 요약">
				<div>
					<span>기간</span>
					<strong>4박 5일</strong>
				</div>
				<div>
					<span>항공</span>
					<strong>제주항공 7C2315</strong>
				</div>
				<div>
					<span>핵심</span>
					<strong>사파리 · 혼똔섬 · 선셋타운</strong>
				</div>
			</section>

			<section class="section" id="timeTable">
				<div class="section-head">
					<div>
						<p class="kicker">TIME TABLE</p>
						<h2>전체 시간표</h2>
					</div>
					<p>날짜를 선택하면 해당 날짜의 흐름만 시간순으로 표시합니다.</p>
				</div>
				<div class="day-strip" id="dayTabs" aria-label="날짜 선택"></div>
				<div class="time-table" id="timeTableBox"></div>
			</section>

			<section class="section" id="links">
				<div class="section-head">
					<div>
						<p class="kicker">LINKS</p>
						<h2>장소와 참고 링크</h2>
					</div>
					<p>지도와 검색 링크는 새 탭으로 열립니다.</p>
				</div>
				<div class="link-grid" id="linkGrid"></div>
			</section>

			<section class="section" id="checklist">
				<div class="section-head">
					<div>
						<p class="kicker">CHECKLIST</p>
						<h2>출발 전 확인</h2>
					</div>
					<p>체크 상태는 현재 브라우저에만 저장됩니다.</p>
				</div>
				<div class="check-list" id="checkList"></div>
			</section>
		</main>
	</div>

	<script src="app.js"></script>
</body>
</html>
